<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
body{
font-family:'Segoe UI',Tahoma;
background:#0a0a0a;
color:#fff;
padding:40px;
text-align:center;
}
.box{
background:rgba(0,123,255,0.1);
border:1px solid #007bff;
border-radius:15px;
padding:30px;
max-width:500px;
margin:50px auto;
}
button{
padding:15px 30px;
background:#007bff;
border:none;
border-radius:10px;
color:#fff;
font-size:16px;
cursor:pointer;
margin:10px;
}
button:hover{background:#0056b3}
#status{margin-top:20px;font-size:16px}
</style>
</head>
<body>
<div class="box">
<h2>لوحة التحكم</h2>
<p>مرحباً: <span id="userEmail"></span></p>
<button onclick="backupData()">📧 نسخ احتياطي لإيميلي</button>
<button onclick="logout()">تسجيل خروج</button>
<div id="status"></div>
</div>

<script>
const SUPABASE_URL = 'https://jrgfhtwhdlerzpbfstok.supabase.co'
const SUPABASE_KEY = 'sb_publishable_tbFu2PoX75gcrv82YjYCtw_AonRDoPM'
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

// نتأكد اذا مسجل دخول
supabase.auth.getUser().then(({data:{user}})=>{
if(!user){
window.location.href = 'index.html'
}else{
document.getElementById('userEmail').textContent = user.email
}
})

// دالة النسخ الاحتياطي
async function backupData(){
const status = document.getElementById('status')
status.textContent = 'جاري تحضير النسخة...'
status.style.color = '#ffd93d'

const { data: { user } = await supabase.auth.getUser()

// هنا سوي النسخة - مثال
const backup = {
التاريخ: new Date().toLocaleString('ar-IQ'),
الايميل: user.email,
البيانات: 'هاي بياناتك هسه...'
}

// ننزل الملف
const blob = new Blob([JSON.stringify(backup,null,2)], {type:'application/json'})
const url = URL.createObjectURL(blob)
const a = document.createElement('a')
a.href = url
a.download = 'backup_' + Date.now() + '.json'
a.click()

status.textContent = 'تم تحميل النسخة وارسالها لإيميلك: ' + user.email
status.style.color = '#6bff6b'
}

async function logout(){
await supabase.auth.signOut()
window.location.href = 'index.html'
}
</script>
</body>
</html>
