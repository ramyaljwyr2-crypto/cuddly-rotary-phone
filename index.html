<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
body{background:linear-gradient(135deg,#0a0a0a 0%,#1a1a2e 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border:1px solid rgba(0,170,255,0.3);border-radius:20px;padding:40px 30px;width:100%;max-width:400px;box-shadow:0 0 30px rgba(0,170,255,0.2)}
h2{color:#00aaff;text-align:center;margin-bottom:30px;font-size:28px}
input{width:100%;padding:15px;margin-bottom:20px;background:rgba(0,0,0,0.4);border:1px solid #333;border-radius:10px;color:#fff;font-size:16px;outline:none}
input:focus{border-color:#00aaff;box-shadow:0 0 10px rgba(0,170,255,0.5)}
button{width:100%;padding:15px;background:linear-gradient(135deg,#00aaff 0%,#0066cc 100%);border:none;border-radius:10px;color:#fff;font-size:18px;font-weight:bold;cursor:pointer;transition:0.3s}
button:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(0,170,255,0.5)}
button:disabled{opacity:0.5;cursor:not-allowed}
#error{color:#ff4444;text-align:center;margin-top:15px;font-size:14px;min-height:20px}
</style>
</head>
<body>
<div class="login-box">
<h2>تسجيل الدخول</h2>
<input type="email" id="email" placeholder="الايميل" value="admin@ramij.com">
<input type="password" id="password" placeholder="كلمة المرور" value="123456">
<button id="loginBtn" onclick="login()">دخول</button>
<div id="error"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://jrgfhtwhdlmrzpbfstok.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpyZ2ZodHdobGRtcnpwYmZzdG9rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDAwMDAwMDAsImV4cCI6MjAxNTU3NjAwMH0.xxxxxxx'

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

async function login(){
const btn = document.getElementById('loginBtn')
const error = document.getElementById('error')
const email = document.getElementById('email').value
const password = document.getElementById('password').value

error.textContent = ''
btn.disabled = true
btn.textContent = 'جاري الدخول...'

try{
const { data, error: err } = await supabase.auth.signInWithPassword({email,password})
if(err) throw err
window.location.href = 'dashboard.html'
}catch(e){
error.textContent = e.message
btn.disabled = false
btn.textContent = 'دخول'
}
</script>
</body>
</html>
