<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول - لوحة التحكم</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Segoe UI',Tahoma,sans-serif;
background:linear-gradient(135deg,#0a0a0a 0%,#1a1a2e 50%,#16213e 100%);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
position:relative;
}
/* خلفية التروس */
.gear{
position:absolute;
font-size:80px;
color:rgba(0,123,255,0.1);
animation:rotate 20s linear infinite;
user-select:none;
}
.gear:nth-child(1){top:10%;right:10%;animation-duration:25s}
.gear:nth-child(2){bottom:15%;left:8%;animation-duration:30s;font-size:120px}
.gear:nth-child(3){top:50%;left:50%;animation-duration:20s;font-size:60px}
@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

.login-box{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border:1px solid rgba(0,123,255,0.3);
padding:40px 35px;
border-radius:20px;
box-shadow:0 8px 32px rgba(0,123,255,0.2);
width:90%;
max-width:400px;
text-align:center;
position:relative;
z-index:10;
}
h2{
color:#fff;
margin-bottom:30px;
font-size:28px;
text-shadow:0 0 20px rgba(0,123,255,0.5);
}
input{
width:100%;
padding:15px;
margin:12px 0;
border:2px solid rgba(0,123,255,0.3);
border-radius:12px;
background:rgba(0,0,0,0.4);
color:#fff;
font-size:16px;
outline:none;
transition:0.3s;
}
input:focus{
border-color:#007bff;
box-shadow:0 0 15px rgba(0,123,255,0.5);
}
input::placeholder{color:#aaa}
button{
width:100%;
padding:15px;
margin-top:20px;
background:linear-gradient(90deg,#007bff,#0056b3);
border:none;
border-radius:12px;
color:#fff;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
box-shadow:0 4px 15px rgba(0,123,255,0.4);
}
button:hover{
transform:translateY(-2px);
box-shadow:0 6px 20px rgba(0,123,255,0.6);
}
#msg{
margin-top:15px;
font-size:14px;
min-height:20px;
color:#ff6b6b;
}
</style>
</head>
<body>

<!-- تروس متحركة -->
<div class="gear">⚙️</div>
<div class="gear">⚙️</div>
<div class="gear">⚙️</div>

<div class="login-box">
<h2>🔐 تسجيل الدخول</h2>
<input type="email" id="email" placeholder="البريد الإلكتروني">
<input type="password" id="password" placeholder="كلمة المرور">
<button onclick="login()">دخول</button>
<div id="msg"></div>
</div>

<script>
// ====== بيانات Supabase مالك ======
const SUPABASE_URL = 'https://jrgfhtwhdlerzpbfstok.supabase.co'
const SUPABASE_KEY = 'sb_publishable_tbFu2PoX75gcrv82YjYCtw_AonRDoPM'
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
// Region: ap-southeast-1 سنغافورة

async function login(){
const email = document.getElementById('email').value.trim()
const password = document.getElementById('password').value.trim()
const msg = document.getElementById('msg')

if(!email || !password){
msg.textContent = 'رجاءً املأ الحقول كلها'
return
}

msg.textContent = 'جاري التحقق...'
msg.style.color = '#ffd93d'

const { data, error } = await supabase.auth.signInWithPassword({email,password})

if(error){
msg.textContent = 'خطأ: ' + error.message
msg.style.color = '#ff6b6b'
}else{
msg.textContent = 'تم الدخول بنجاح ✓'
msg.style.color = '#6bff6b'
setTimeout(()=>{
window.location.href = 'dashboard.html'
},1000)
}
</script>
</body>
</html>
