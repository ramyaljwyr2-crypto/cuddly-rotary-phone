<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;transition:0.3s}
:root{
  --bg1:#0a0a0a; --bg2:#1a1a2e; --box:#16213e; --text:#fff; --border:#2196F3; --input:#0f0f23
}
body.light{
  --bg1:#f0f0f0; --bg2:#e0e0e0; --box:#ffffff; --text:#000; --border:#2196F3; --input:#f5f5f5
}
body{background:linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 100%);color:var(--text);font-family:Arial;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}

/* خلفية الضبط الي تدور */
.gear-bg{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  z-index:-1;
  overflow:hidden;
  opacity:0.15;
}
.gear-bg span{
  position:absolute;
  font-size:60px;
  animation:float 20s infinite linear;
  color:var(--border);
}
.gear1{top:10%;left:5%;animation-delay:0s}
.gear2{top:60%;left:80%;animation-delay:5s;font-size:80px}
.gear3{top:30%;left:40%;animation-delay:10s}
.gear4{top:80%;left:20%;animation-delay:15s;font-size:70px}

@keyframes float{
 0%{transform:rotate(0deg) translateY(0)}
 100%{transform:rotate(360deg) translateY(-100vh)}
}

.theme-btn{position:absolute;top:20px;left:20px;background:var(--border);border:none;color:#fff;padding:10px 15px;border-radius:50%;font-size:20px;cursor:pointer;z-index:10}
.box{background:var(--box);padding:40px;border-radius:20px;border:2px solid var(--border);width:90%;max-width:400px;box-shadow:0 0 30px rgba(33,150,243,0.3);z-index:5}
h2{text-align:center;color:var(--border);margin-bottom:20px;font-size:28px}
input{width:100%;padding:15px;margin:12px 0;background:var(--input);border:2px solid var(--bg1);color:var(--text);border-radius:10px;font-size:16px;outline:none}
input:focus{border-color:var(--border)}
.whatsapp-btn{width:100%;padding:12px;background:#25D366;border:none;color:#fff;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;margin:10px 0;display:flex;align-items:center;justify-content:center;gap:8px}
.whatsapp-btn:hover{background:#1ebc5a;transform:scale(1.02)}
.login-btn{width:100%;padding:15px;background:linear-gradient(90deg,#2196F3,#21CBF3);border:none;color:#fff;border-radius:10px;font-size:18px;font-weight:bold;cursor:pointer;margin-top:10px}
.login-btn:hover{transform:scale(1.02)}
</style>
</head>
<body>

<!-- الضبط الي تدور بالخلفية -->
<div class="gear-bg">
  <span class="gear1">⚙️</span>
  <span class="gear2">⚙️</span>
  <span class="gear3">⚙️</span>
  <span class="gear4">⚙️</span>
</div>

<!-- زر الوضع الليلي والنهاري -->
<button class="theme-btn" onclick="toggleTheme()">🌙</button>

<div class="box">
<h2>🔵 تسجيل الدخول</h2>
<input type="email" placeholder="📧 الايميل">
<input type="password" placeholder="🔒 كلمة السر">

<!-- زر الواتساب تحت الباسورد مباشرة -->
<a href="https://wa.me/9647721701620" target="_blank">
<button class="whatsapp-btn">💚 مراسلة المطور لتفعيل التطبيق</button>
</a>

<button class="login-btn">دخول</button>
</div>

<script>
function toggleTheme(){
  document.body.classList.toggle('light');
  document.querySelector('.theme-btn').textContent = document.body.classList.contains('light') ? '🌙' : '☀️';
}
</script>
</body>
</html>
