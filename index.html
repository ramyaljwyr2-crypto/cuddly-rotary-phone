<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الخضرانية لخدمات الإنترنت</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg1: #0a0a0a;
  --bg2: #1a1a1a;
  --card: #222;
  --text: #eee;
  --input: #333;
  --border: #444;
  --accent: #4a90e2;
}

body.light {
  --bg1: #e0e0e0;
  --bg2: #f5f5f5;
  --card: #fff;
  --text: #111;
  --input: #f0f0f0;
  --border: #ddd;
  --accent: #0077ff;
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo', sans-serif; }
body {
  background: linear-gradient(135deg, var(--bg1), var(--bg2));
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  transition: 0.4s;
  color: var(--text);
}
.login-box {
  background: var(--card);
  padding: 40px 30px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  width: 90%;
  max-width: 380px;
  text-align: center;
  transition: 0.4s;
}
.login-box h2 {
  margin-bottom: 25px;
  color: var(--accent);
}
.login-box input {
  width: 100%;
  padding: 14px;
  margin: 12px 0;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--input);
  color: var(--text);
  outline: none;
  font-size: 16px;
  transition: 0.3s;
}
.login-box input:focus {
  border-color: var(--accent);
}
.login-box button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border: none;
  border-radius: 10px;
  background: var(--accent);
  color: #fff;
  font-size: 17px;
  cursor: pointer;
  transition: 0.3s;
}
.login-box button:hover {
  opacity: 0.9;
}
.theme-btn {
  position: absolute;
  top: 20px;
  left: 20px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
}
.error {
  color: #ff5555;
  font-size: 14px;
  margin-top: 10px;
  display: none;
}
</style>
</head>
<body>
<button class="theme-btn" onclick="toggleTheme()">🌙/☀️</button>

<div class="login-box">
  <h2>تسجيل الدخول</h2>
  <input type="email" id="email" placeholder="الإيميل">
  <input type="password" id="password" placeholder="كلمة المرور">
  <button onclick="login()">دخول</button>
  <div class="error" id="error"></div>
</div>

<script>
// حط مفاتيح Supabase مالك هنا بعدين
const SUPABASE_URL = 'https://xxxx.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

// تبديل الثيم وحفظه
function toggleTheme() {
  document.body.classList.toggle('light');
  localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
}
if(localStorage.getItem('theme') === 'light') {
  document.body.classList.add('light');
}

// تسجيل الدخول
async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const errorDiv = document.getElementById('error');
  errorDiv.style.display = 'none';

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  
  if(error) {
    errorDiv.innerText = 'الإيميل أو كلمة المرور غلط';
    errorDiv.style.display = 'block';
  } else {
    window.location.href = 'dashboard.html';
  }
}
</script>
</body>
</html>
