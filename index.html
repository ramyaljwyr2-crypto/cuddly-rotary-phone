<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
body{font-family:'Segoe UI';background:#0a0a0a;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{background:#1a1a2e;padding:40px;border-radius:20px;border:1px solid #007bff;width:90%;max-width:400px;text-align:center}
input{width:100%;padding:15px;margin:10px 0;background:#000;border:2px solid #007bff;border-radius:10px;color:#fff;font-size:16px}
button{width:100%;padding:15px;background:#007bff;border:none;border-radius:10px;color:#fff;font-size:18px;cursor:pointer;margin-top:15px}
#msg{margin-top:15px;color:#ff6b6b}
</style>
</head>
<body>
<div class="box">
<h2>🔐 تسجيل الدخول</h2>
<input type="email" id="email" placeholder="الايميل">
<input type="password" id="password" placeholder="كلمة المرور">
<button id="btn" onclick="login()">دخول</button>
<div id="msg"></div>
</div>

<script>
// ====== لصق بياناتك هنا ======
const SUPABASE_URL = 'https://jrgfhtwhdlerzpbfstok.supabase.co'
const SUPABASE_KEY = 'sb_publishable_tbFu2PoX75gcrv82YjYCtw_AonRDoPM'
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

async function login(){
const email = document.getElementById('email').value
const password = document.getElementById('password').value
const msg = document.getElementById('msg')
const btn = document.getElementById('btn')

btn.disabled = true
btn.textContent = 'جاري التحقق...'
msg.textContent = ''

const { data, error } = await supabase.auth.signInWithPassword({email,password})

if(error){
msg.textContent = 'خطأ: ' + error.message
btn.disabled = false
btn.textContent = 'دخول'
}else{
msg.style.color = '#6bff6b'
msg.textContent = 'تم ✓'
window.location.href = 'dashboard.html'
}
</script>
</body>
</html>
