<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الخضرانية لخدمات الإنترنت</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg1: #0a0a0a;
  --bg2: #181818;
  --card: rgba(34,34,34,0.85);
  --text: #eee;
  --input: rgba(42,42,42,0.9);
  --border: #444;
  --accent: #4a90e2;
  --muted: #aaa;
}

body.light {
  --bg1: #f0f2f5;
  --bg2: #ffffff;
  --card: rgba(255,255,255,0.9);
  --text: #111;
  --input: rgba(245,245,245,0.9);
  --border: #ddd;
  --accent: #0077ff;
  --muted: #666;
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo', sans-serif; }
body {
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color: var(--text);
  overflow: hidden;
  position: relative;
}

/* الخلفية الحية بعجلات الضبط */
.gears {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  background: linear-gradient(135deg, var(--bg1), var(--bg2));
  overflow: hidden;
}
.gear {
  position: absolute;
  font-size: 60px;
  color: var(--accent);
  opacity: 0.15;
  animation: rotate 20s linear infinite;
}
.gear:nth-child(2) { animation-duration: 25s; animation-direction: reverse; }
.gear:nth-child(3) { animation-duration: 30s; }
.gear:nth-child(4) { animation-duration: 18s; animation-direction: reverse; }
.gear:nth-child(5) { animation-duration: 22s; }

@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.login-box {
  background: var(--card);
  backdrop-filter: blur(10px);
  padding: 40px 30px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  width: 90%;
  max-width: 380px;
  text-align: center;
  transition: 0.4s;
  position: relative;
  z-index: 10;
  border: 1px solid var(--border);
}
.login-box h2 {
  margin-bottom: 25px;
  color: var(--accent);
}
.login-box input {
  width: 100%;
  padding: 14px;
  margin: 12px 0;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--input);
  color: var(--text);
  outline: none;
  font-size: 16px;
  transition: 0.3s;
}
.login-box input:focus {
  border-color: var(--accent);
}
.login-box button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border: none;
  border-radius: 10px;
  background: var(--accent);
  color: #fff;
  font-size: 17px;
  cursor: pointer;
  transition: 0.3s;
}
.login-box button:hover {
  opacity: 0.9;
}
.theme-btn {
  position: absolute;
  top: 15px;
  left: 15px;
  background: var(--input);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 18px;
  z-index: 11;
}
.links {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.links a {
  text-decoration: none;
  color: var(--muted);
  font-size: 14px;
  transition: 0.3s;
}
.links a:hover {
  color: var(--accent);
}
.error {
  color: #ff5555;
  font-size: 14px;
  margin-top: 10px;
  display: none;
}
</style>
</head>
<body>

<!-- الخلفية الحية -->
<div class="gears">
  <div class="gear" style="top:10%; left:15%;">⚙️</div>
  <div class="gear" style="top:60%; left:80%; font-size:80px;">⚙️</div>
  <div class="gear" style="top:30%; left:70%; font-size:40px;">⚙️</div>
  <div class="gear" style="top:75%; left:20%; font-size:70px;">⚙️</div>
  <div class="gear" style="top:45%; left:45%; font-size:100px;">⚙️</div>
</div>

<button class="theme-btn" onclick="toggleTheme()">🌙</button>

<div class="login-box">
  <h2>تسجيل الدخول</h2>
  <input type="email" id="email" placeholder="الإيميل">
  <input type="password" id="password" placeholder="كلمة المرور">
  <button onclick="login()">دخول</button>
  <div class="error" id="error"></div>

  <div class="links">
    <a href="https://wa.me/9647721701620" target="_blank">📱 واتساب 07721701620</a>
    <a href="https://t.me/j1_ra_2" target="_blank">✈️ تلجرام @j1_ra_2</a>
    <a href="mailto:ramyaljwyr2@gmail.com">✉️ مراسلة المطور</a>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://xxxx.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

function toggleTheme() {
  document.body.classList.toggle('light');
  const btn = document.querySelector('.theme-btn');
  if(document.body.classList.contains('light')) {
    btn.innerText = '🌙';
    localStorage.setItem('theme', 'light');
  } else {
    btn.innerText = '☀️';
    localStorage.setItem('theme', 'dark');
  }
}
if(localStorage.getItem('theme') === 'light') {
  document.body.classList.add('light');
  document.querySelector('.theme-btn').innerText = '🌙';
} else {
  document.querySelector('.theme-btn').innerText = '☀️';
}

async function login() {
  const email = document.getElementById('email').email;
  const password = document.getElementById('password').value;
  const errorDiv = document.getElementById('error');
  errorDiv.style.display = 'none';

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  
  if(error) {
    errorDiv.innerText = 'الإيميل أو كلمة المرور غلط';
    errorDiv.style.display = 'block';
  } else {
    window.location.href = 'dashboard.html';
  }
}
</script>
</body>
</html>
