<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الخضرانيه لخدمات الانترنت</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f172a;
      color: white;
      font-family: 'Tajawal', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .login-screen, .dashboard { display: none; width: 100%; }
    .login-screen.active, .dashboard.active { display: flex; }
    
    .login-container {
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    
    .logo {
      width: 90px;
      height: 90px;
      background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
      border-radius: 25px;
      margin: 0 auto 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
    }
    .logo svg { width: 45px; height: 45px; stroke: white; stroke-width: 2; fill: none; }
    
    h1 { font-size: 30px; margin-bottom: 8px; font-weight: 700; }
    .subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 40px; }
    
    .login-box {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 35px 25px;
      backdrop-filter: blur(10px);
    }
    
    .input-group { margin-bottom: 20px; text-align: right; }
    .input-label { 
      display: block; 
      margin-bottom: 8px; 
      font-size: 14px; 
      color: #cbd5e1; 
    }
    
    .input-wrapper { position: relative; }
    .input-wrapper svg {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      stroke: #64748b;
    }
    input {
      width: 100%;
      padding: 16px 45px 16px 15px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: white;
      font-size: 15px;
      outline: none;
      transition: 0.3s;
    }
    input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
    input::placeholder { color: #475569; text-align: left; }
    
    .login-btn {
      width: 100%;
      padding: 16px;
      margin-top: 25px;
      background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: 0.3s;
    }
    .login-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4); }
    
    .footer-badges {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .badge {
      background: rgba(30, 41, 59, 0.6);
      padding: 10px 20px;
      border-radius: 25px;
      font-size: 13px;
      border: 1px solid rgba(255,255,255,0.05);
      display: inline-block;
    }
    .badge span:first-child { color: #3b82f6; font-weight: 600; }
    
    .error { color: #ef4444; margin-top: 12px; display: none; font-size: 13px; }
    
    /* لوحة التحكم */
    .dashboard {
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .header h1 { font-size: 26px; margin-bottom: 5px; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      width: 100%;
      max-width: 600px;
      margin-top: 30px;
    }
    .box {
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 25px 20px;
      cursor: pointer;
      text-align: center;
      transition: 0.3s;
    }
    .box:hover { background: rgba(30, 41, 59, 0.8); transform: translateY(-3px); border-color: #3b82f6; }
    .box h3 { margin: 10px 0 5px; font-size: 16px; }
    .box p { color: #94a3b8; font-size: 13px; }
    
    .popup {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 20px;
    }
    .popup.active { display: flex; }
    .popup-content {
      background: #1e293b;
      padding: 30px 25px;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .popup-content h3 { margin-bottom: 20px; text-align: center; }
    .close { float: left; cursor: pointer; font-size: 28px; color: #64748b; }
    .close:hover { color: white; }
    .btn-whatsapp { background: #25D366; }
    .btn-secondary { background: rgba(255,255,255,0.1); margin-top: 15px; }
    
    @media(max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>

<!-- شاشة تسجيل الدخول -->
<div class="login-screen active" id="loginScreen">
  <div class="login-container">
    <div class="logo">
      <svg viewBox="0 0 24 24">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
      </svg>
    </div>
    
    <h1>الخضرانيه لخدمات الانترنت</h1>
    <p class="subtitle">نظام إدارة المشتركين</p>
    
    <div class="login-box">
      <div class="input-group">
        <label class="input-label">Email</label>
        <div class="input-wrapper">
          <input type="text" id="user" placeholder="admin@example.com">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
      </div>
      
      <div class="input-group">
        <label class="input-label">كلمة المرور</label>
        <div class="input-wrapper">
          <input type="password" id="pass" placeholder="••••">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
      </div>
      
      <button class="login-btn" onclick="login()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
        تسجيل الدخول
      </button>
      
      <p class="error" id="error">اليوزر او الباسورد غلط!</p>
    </div>
    
    <div class="footer-badges">
      <div class="badge"><span>الخضرانيه</span> powered by</div>
      <a href="https://wa.me/9647721701620" target="_blank" style="text-decoration: none;">
        <button class="login-btn btn-whatsapp">يمكنكم مراسلة المطور 07721701620</button>
      </a>
    </div>
  </div>
</div>

<!-- لوحة التحكم -->
<div class="dashboard" id="dashboard">
  <div class="header">
    <h1>الخضرانيه لخدمات الانترنت</h1>
    <p class="subtitle">لوحة تحكم المدير</p>
  </div>
  
  <div class="grid">
    <div class="box" onclick="openPopup('addUser')">
      <svg width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <h3>اضافة مشترك</h3>
      <p>يوزر + باسورد + رقم هاتف</p>
    </div>
    
    <div class="box" onclick="openPopup('addAgent')">
      <svg width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <h3>اضافة وكيل</h3>
      <p>المدير فقط - صلاحيات محدودة</p>
    </div>
  </div>
  
  <button class="login-btn btn-secondary" onclick="logout()" style="max-width: 200px;">تسجيل خروج</button>
</div>

<!-- بوب اب اضافة وكيل -->
<div class="popup" id="addAgentPopup">
  <div class="popup-content">
    <span class="close" onclick="closePopup()">&times;</span>
    <h3>اضافة وكيل جديد</h3>
    <input type="text" id="agentName" placeholder="اسم الوكيل" style="margin: 10px 0; width: 100%; padding: 14px; background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white;">
    <input type="text" id="agentUser" placeholder="يوزر الوكيل" style="margin: 10px 0; width: 100%; padding: 14px; background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white;">
    <input type="password" id="agentPass" placeholder="باسورد الوكيل" style="margin: 10px 0; width: 100%; padding: 14px; background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white;">
    <input type="tel" id="agentPhone" placeholder="رقم الهاتف 07..." style="margin: 10px 0; width: 100%; padding: 14px; background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white;">
    <button class="login-btn" onclick="addAgent()">اضافة الوكيل + ارسال واتساب</button>
  </div>
</div>

<!-- بوب اب اضافة مشترك -->
<div class="popup" id="addUserPopup">
  <div class="popup-content">
    <span class="close" onclick="closePopup()">&times;</span>
    <h3>اضافة مشترك جديد</h3>
    <input type="text" id="userName" placeholder="يوزر المشترك" style="margin: 10px 0; width: 100%; padding: 14px; background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white;">
    <input type="password" id="userPass" placeholder="باسورد المشترك" style="margin: 10px 0; width: 100%; padding: 14px; background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white;">
    <input type="tel" id="userPhone" placeholder="رقم الهاتف 07..." style="margin: 10px 0; width: 100%; padding: 14px; background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white;">
    <button class="login-btn" onclick="addUser()">اضافة المشترك</button>
  </div>
</div>

<script>
function login() {
  var user = document.getElementById('user').value;
  var pass = document.getElementById('pass').value;
  
  if(user === 'admin' && pass === '1234') {
    document.getElementById('loginScreen').classList.remove('active');
    document.getElementById('dashboard').classList.add('active');
  } else {
    document.getElementById('error').style.display = 'block';
    setTimeout(() => document.getElementById('error').style.display = 'none', 3000);
  }
}

function logout() {
  document.getElementById('dashboard').classList.remove('active');
  document.getElementById('loginScreen').classList.add('active');
  document.getElementById('user').value = '';
  document.getElementById('pass').value = '';
}

function openPopup(type) {
  document.getElementById(type + 'Popup').classList.add('active');
}

function closePopup() {
  document.querySelectorAll('.popup').forEach(p => p.classList.remove('active'));
  // تفريغ الحقول
  document.querySelectorAll('.popup input').forEach(i => i.value = '');
}

function addAgent() {
  let name = document.getElementById('agentName').value;
  let user = document.getElementById('agentUser').value;
  let pass = document.getElementById('agentPass').value;
  let phone = document.getElementById('agentPhone').value;
  
  if(name && user && pass && phone) {
    let cleanPhone = phone.replace(/^0/, '');
    let msg = `مرحبا ${name}%0Aتم تفعيل حسابك وكيل بالخضرانيه لخدمات الانترنت%0A%0Aاليوزر: ${user}%0Aالباسورد: ${pass}%0A%0Aرابط التطبيق: [رابطك هنا]`;
    window.open(`https://wa.me/964${cleanPhone}?text=${msg}`, '_blank');
    alert('تم اضافة الوكيل ✅\nتم فتح واتساب لارسال البيانات');
    closePopup();
  } else {
    alert('املأ كل الحقول يا بطل');
  }
}

function addUser() {
  let user = document.getElementById('userName').value;
  let pass = document.getElementById('userPass').value;
  let phone = document.getElementById('userPhone').value;
  
  if(user && pass && phone) {
    alert(`تم اضافة المشترك: ${user} ✅`);
    closePopup();
  } else {
    alert('املأ كل الحقول');
  }
}
</script>

</body>
</html>
