<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام الخضرانية</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg1: #0a0a0a;
  --bg2: #181818;
  --card: rgba(34,34,34,0.85);
  --text: #eee;
  --border: #444;
  --accent: #4a90e2;
}

body.light {
  --bg1: #f0f2f5;
  --bg2: #ffffff;
  --card: rgba(255,255,255,0.9);
  --text: #111;
  --border: #ddd;
  --accent: #0077ff;
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo', sans-serif; }
body {
  min-height:100vh;
  color: var(--text);
  overflow: hidden;
  position: relative;
}

/* العجلات تفتر بالخلفية */
.gears {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  background: linear-gradient(135deg, var(--bg1), var(--bg2));
  overflow: hidden;
}
.gear {
  position: absolute;
  font-size: 60px;
  color: var(--accent);
  opacity: 0.15;
  animation: rotate 20s linear infinite;
}
.gear:nth-child(2) { animation-duration: 25s; animation-direction: reverse; top:60%; left:80%; font-size:80px; }
.gear:nth-child(3) { animation-duration: 30s; top:30%; left:70%; font-size:40px; }
.gear:nth-child(4) { animation-duration: 18s; animation-direction: reverse; top:75%; left:20%; font-size:70px; }
.gear:nth-child(5) { animation-duration: 22s; top:45%; left:45%; font-size:100px; }

@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* الكونتينر */
.container {
  position: relative;
  z-index: 10;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.box {
  background: var(--card);
  backdrop-filter: blur(10px);
  padding: 40px;
  border-radius: 20px;
  border: 1px solid var(--border);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  width: 100%;
  max-width: 400px;
}

h2 {
  text-align: center;
  color: var(--accent);
  margin-bottom: 30px;
  font-size: 28px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg1);
  color: var(--text);
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 8px;
  background: var(--accent);
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  transition: 0.3s;
}
button:hover { opacity: 0.9; }

.error {
  color: #ff5555;
  text-align: center;
  margin-top: 10px;
  display: none;
}

/* صفحة الضبط */
.dashboard {
  display: none;
  padding: 30px;
  max-width: 900px;
  margin: 0 auto;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--card);
  padding: 20px;
  border-radius: 15px;
  border: 1px solid var(--border);
  margin-bottom: 30px;
}

.theme-btn {
  position: fixed;
  top: 15px;
  left: 15px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 18px;
  z-index: 11;
}

.hidden { display: none !important; }
</style>
</head>
<body>

<div class="gears">
  <div class="gear" style="top:10%; left:15%;">⚙️</div>
  <div class="gear">⚙️</div>
  <div class="gear">⚙️</div>
  <div class="gear">⚙️</div>
  <div class="gear">⚙️</div>
</div>

<button class="theme-btn" onclick="toggleTheme()">🌙</button>

<!-- صفحة الدخول -->
<div class="container" id="loginPage">
  <div class="box">
    <h2>تسجيل الدخول</h2>
    <input type="email" id="email" placeholder="الايميل" required>
    <input type="password" id="password" placeholder="كلمة المرور" required>
    <button onclick="login()">دخول</button>
    <div class="error" id="error"></div>
  </div>
</div>

<!-- صفحة الضبط -->
<div class="dashboard" id="dashboardPage">
  <div class="header">
    <h2>مرحباً بك في لوحة التحكم</h2>
    <button onclick="logout()">خروج</button>
  </div>
  
  <div class="box" style="max-width: 900px;">
    <h3 style="color: var(--accent); margin-bottom: 20px;">الضبط العام</h3>
    <p>هنا تقدر تضيف الروابط والاعدادات مال تطبيقك</p>
    <br>
    <input type="text" placeholder="رابط الواتساب">
    <input type="text" placeholder="رابط التليجرام">
    <input type="text" placeholder="الايميل الرسمي">
    <button>حفظ التغييرات</button>
  </div>
</div>

<script>
// === حط مفاتيح Supabase مالك هنا ===
const SUPABASE_URL = 'https://jqfhtwhdlmrzpbfstok.supabase.co'
const SUPABASE_KEY = 'sb_publishable_tbfuzPoX7Sgcry82Y2jCtw_AonRDoPM'
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

// التحقق اذا مسجل دخول
supabase.auth.getSession().then(({ data: { session } }) => {
  if (session) {
    showDashboard();
  }
})

// تبديل الثيم
function toggleTheme() {
  document.body.classList.toggle('light');
  const btn = document.querySelector('.theme-btn');
  if(document.body.classList.contains('light')) {
    btn.innerText = '🌙';
    localStorage.setItem('theme', 'light');
  } else {
    btn.innerText = '☀️';
    localStorage.setItem('theme', 'dark');
  }
}
if(localStorage.getItem('theme') === 'light') {
  document.body.classList.add('light');
  document.querySelector('.theme-btn').innerText = '🌙';
}

// تسجيل الدخول
async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const errorDiv = document.getElementById('error');
  errorDiv.style.display = 'none';

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });

  if(error) {
    errorDiv.innerText = 'الايميل أو كلمة المرور غلط';
    errorDiv.style.display = 'block';
  } else {
    showDashboard();
  }
}

// عرض الضبط
function showDashboard() {
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('dashboardPage').style.display = 'block';
}

// تسجيل الخروج
async function logout() {
  await supabase.auth.signOut();
  document.getElementById('dashboardPage').style.display = 'none';
  document.getElementById('loginPage').classList.remove('hidden');
}
</script>
</body>
</html>
