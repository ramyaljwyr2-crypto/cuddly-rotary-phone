<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تجربة دخول</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body style="background:#000;color:#fff;text-align:center;padding:50px">
<h2>اختبار Supabase</h2>
<input id="e" placeholder="الايميل" style="padding:10px"><br><br>
<input id="p" type="password" placeholder="الباسورد" style="padding:10px"><br><br>
<button onclick="t()" style="padding:10px 30px">جرب</button>
<p id="r"></p>

<script>
const supabase = window.supabase.createClient('https://jrgfhtwhdlerzpbfstok.supabase.co','sb_publishable_tbFu2PoX75gcrv82YjYCtw_AonRDoPM')
async function t(){
document.getElementById('r').innerText='جاري...'
const {error} = await supabase.auth.signInWithPassword({email:document.getElementById('e').value,password:document.getElementById('p').value})
document.getElementById('r').innerText=error?error.message:'تم الدخول!'
}
</script>
</body>
</html>
